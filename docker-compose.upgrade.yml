# Upgrade overlay — one-shot database upgrade service.
#
# Usage:
#   # Preview changes (dry-run):
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.upgrade.yml run --rm upgrade --dry-run
#
#   # Apply upgrade:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.upgrade.yml run --rm upgrade
#
#   # Check status:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.upgrade.yml run --rm upgrade --status
#
# The upgrade service runs vbpclaw upgrade and exits. Use --rm to auto-remove the container.

services:
  upgrade:
    image: ghcr.io/nextlevelbuilder/goclaw:latest
    build:
      context: ${VBPCLAW_DIR:-.}
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "false"
    env_file:
      - path: .env
        required: false
    environment:
      - VBPCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-vbpclaw}:${POSTGRES_PASSWORD:-vbpclaw}@postgres:5432/${POSTGRES_DB:-vbpclaw}?sslmode=disable
      - VBPCLAW_CONFIG=/app/data/config.json
      - VBPCLAW_MIGRATIONS_DIR=/app/migrations
      - VBPCLAW_ENCRYPTION_KEY=${VBPCLAW_ENCRYPTION_KEY:-}
    volumes:
      - vbpclaw-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/goclaw"]
    command: ["upgrade"]
    restart: "no"
