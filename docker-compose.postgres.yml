# PostgreSQL overlay — pgvector for multi-tenant storage.
#
# Usage (web dashboard built-in by default):
#   make up
#   # or: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d --build
#
# Required env vars (set in .env or shell):
#   VBPCLAW_OPENROUTER_API_KEY (or another provider key)
#   POSTGRES_PASSWORD (defaults to "vbpclaw" for dev)

services:
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vbpclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbpclaw}
      POSTGRES_DB: ${POSTGRES_DB:-vbpclaw}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vbpclaw} -d ${POSTGRES_DB:-vbpclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 64m
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=50

  vbpclaw:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - VBPCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-vbpclaw}:${POSTGRES_PASSWORD:-vbpclaw}@postgres:5432/${POSTGRES_DB:-vbpclaw}?sslmode=disable
    volumes:
      - vbpclaw-skills:/app/skills
      - vbpclaw-workspace:/app/.vbpclaw

volumes:
  postgres-data:
    external: true
    name: vbpclaw_postgres-data
  vbpclaw-skills:
    external: true
    name: vbpclaw_vbpclaw-skills
