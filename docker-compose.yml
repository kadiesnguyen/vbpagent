# Base docker-compose — shared service definition.
# Pre-built images: ghcr.io/nextlevelbuilder/goclaw (also on Docker Hub: digitop/vbpclaw)
#
# The default `latest` image includes an embedded web dashboard (no separate nginx needed).
# Web UI is served at the same port as the API (default: 18790).
#
# Quick start:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#   # Dashboard: http://localhost:18790
#
# Optional nginx (for custom SSL, reverse proxy, caching):
#   make up WITH_WEB_NGINX=1
#   # or: docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.selfservice.yml up -d
#   # Dashboard via nginx: http://localhost:3000
#
# Docker image variants:
#   latest       — Backend + embedded web UI + Python (recommended)
#   latest-base  — Backend API-only, no web UI, no runtimes
#   latest-full  — All runtimes + skill dependencies pre-installed
#   latest-otel  — Latest + OpenTelemetry tracing
#
# With OTel tracing:  add -f docker-compose.otel.yml
# With Claude CLI:    add -f docker-compose.claude-cli.yml

services:
  vbpclaw:
    image: ghcr.io/nextlevelbuilder/goclaw:latest
    build:
      context: ${VBPCLAW_DIR:-.}
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "${ENABLE_OTEL:-false}"
        ENABLE_EMBEDUI: "${ENABLE_EMBEDUI:-true}"  # set to false when using WITH_WEB_NGINX
        ENABLE_PYTHON: "${ENABLE_PYTHON:-true}"
        ENABLE_FULL_SKILLS: "${ENABLE_FULL_SKILLS:-false}"
        VERSION: "${VBPCLAW_VERSION:-dev}"
    # Uncomment to test update UI: VBPCLAW_VERSION=v1.0.0
    ports:
      - "${VBPCLAW_PORT:-18790}:18790"
    env_file:
      - path: .env
        required: false
    environment:
      - VBPCLAW_HOST=0.0.0.0
      - VBPCLAW_PORT=18790
      - VBPCLAW_CONFIG=/app/data/config.json
      - VBPCLAW_GATEWAY_TOKEN=${VBPCLAW_GATEWAY_TOKEN:-}
      - VBPCLAW_ENCRYPTION_KEY=${VBPCLAW_ENCRYPTION_KEY:-}
      - VBPCLAW_SKILLS_DIR=/app/data/skills
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
      - TIKTOK_RAPIDAPI_KEY=${TIKTOK_RAPIDAPI_KEY:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - BRAVE_ANSWERS_API_KEY=${BRAVE_ANSWERS_API_KEY:-}
      # Debug
      - VBPCLAW_TRACE_VERBOSE=${VBPCLAW_TRACE_VERBOSE:-0}
    volumes:
      - vbpclaw-data:/app/data
      - vbpclaw-workspace:/app/workspace
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    networks:
      - default
      - vbpclaw-net
    restart: unless-stopped

volumes:
  vbpclaw-data:
    external: true
    name: vbpclaw_vbpclaw-data
  vbpclaw-workspace:
    external: true
    name: vbpclaw_vbpclaw-workspace
  telegram-bot-api-data:
    external: true
    name: vbpclaw_telegram-bot-api-data

networks:
  vbpclaw-net:
    name: vbpclaw-net
    driver: bridge
